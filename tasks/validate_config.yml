---
- name: Fail if required NGINX Prometheus exporter settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - nginx_prometheus_exporter_identifier
    - nginx_prometheus_exporter_uid
    - nginx_prometheus_exporter_gid
    - nginx_prometheus_exporter_container_network
    - nginx_prometheus_exporter_scrape_uri

- name: Run if Traefik is enabled
  when: nginx_prometheus_exporter_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for NGINX Prometheus exporter are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item.name }}`).
      when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
      with_items:
        - { "name": "nginx_prometheus_exporter_container_labels_traefik_hostname", when: true }
        - { "name": "nginx_prometheus_exporter_container_labels_traefik_path_prefix", when: true }
        - { "name": "nginx_prometheus_exporter_container_labels_metrics_middleware_basic_auth_users", when: "{{ nginx_prometheus_exporter_container_labels_metrics_middleware_basic_auth_enabled }}" }

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `nginx_prometheus_exporter_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if nginx_prometheus_exporter_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          nginx_prometheus_exporter_container_labels_traefik_path_prefix (`{{ nginx_prometheus_exporter_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/metrics/nginx-exporter`).
      when: "nginx_prometheus_exporter_container_labels_traefik_path_prefix != '/' and nginx_prometheus_exporter_container_labels_traefik_path_prefix[-1] == '/'"
