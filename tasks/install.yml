---

- name: Ensure NGINX Prometheus exporter paths exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0750"
    owner: "{{ nginx_prometheus_exporter_uid }}"
    group: "{{ nginx_prometheus_exporter_gid }}"
  with_items:
    - path: "{{ nginx_prometheus_exporter_base_path }}"
      when: true
  when: item.when | bool

- name: Ensure NGINX Prometheus exporter support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ nginx_prometheus_exporter_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ nginx_prometheus_exporter_uid }}"
    group: "{{ nginx_prometheus_exporter_gid }}"
  with_items:
    - env
    - labels
  register: nginx_prometheus_exporter_support_files_result

- name: Run if self-building of NGINX Prometheus exporter container image is not enabled
  when: "not nginx_prometheus_exporter_container_image_self_build | bool"
  block:
    - name: Ensure NGINX Prometheus exporter container image is pulled via community.docker.docker_image_pull
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image_pull:
        name: "{{ nginx_prometheus_exporter_container_image }}"
        pull: always
      register: nginx_prometheus_exporter_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: nginx_prometheus_exporter_container_image_pull_result_ansible_module is not failed

    - name: Ensure NGINX Prometheus exporter container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ nginx_prometheus_exporter_container_image }}"
      register: nginx_prometheus_exporter_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: nginx_prometheus_exporter_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in nginx_prometheus_exporter_container_image_pull_result_command.stdout"

- name: Run if self-building of NGINX Prometheus exporter container image is enabled
  when: "nginx_prometheus_exporter_container_image_self_build | bool"
  block:
    - name: Ensure NGINX Prometheus exporter repository is present on self-build
      ansible.builtin.git:
        repo: "{{ nginx_prometheus_exporter_container_image_self_build_repo }}"
        version: "{{ nginx_prometheus_exporter_container_image_self_build_repo_version }}"
        dest: "{{ nginx_prometheus_exporter_container_image_self_build_src_files_path }}"
        force: "yes"
      register: nginx_prometheus_exporter_git_pull_results

    - name: Ensure NGINX Prometheus exporter container image is built
      community.docker.docker_image_build:
        name: "{{ nginx_prometheus_exporter_container_image_self_build_name }}"
        dockerfile: build/Dockerfile
        target: container
        args:
          VERSION: "{{ nginx_prometheus_exporter_version }}"
        path: "{{ nginx_prometheus_exporter_container_image_self_build_src_files_path }}"
        pull: true
        rebuild: "{{ 'always' if nginx_prometheus_exporter_git_pull_results.changed | bool else 'never' }}"
      register: nginx_prometheus_exporter_container_image_build_result

- name: Ensure NGINX Prometheus exporter container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ nginx_prometheus_exporter_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: nginx_prometheus_exporter_network_creation_result

- name: Ensure NGINX Prometheus exporter container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ nginx_prometheus_exporter_container_network }}
  register: nginx_prometheus_exporter_network_creation_result
  changed_when: nginx_prometheus_exporter_network_creation_result.rc == 0
  failed_when: nginx_prometheus_exporter_network_creation_result.rc != 0 and 'already exists' not in nginx_prometheus_exporter_network_creation_result.stderr

- name: Ensure NGINX Prometheus exporter systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/nginx-prometheus-exporter.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ nginx_prometheus_exporter_identifier }}.service"
    mode: "0644"
  register: nginx_prometheus_exporter_systemd_service_result

- name: Determine whether NGINX Prometheus exporter needs a restart
  ansible.builtin.set_fact:
    nginx_prometheus_exporter_restart_necessary: >-
      {{
        nginx_prometheus_exporter_support_files_result.changed | default(false)
        or nginx_prometheus_exporter_systemd_service_result.changed | default(false)
        or nginx_prometheus_exporter_container_image_pull_result_ansible_module.changed | default(false)
        or nginx_prometheus_exporter_container_image_pull_result_command.changed | default(false)
        or nginx_prometheus_exporter_container_image_build_result.changed | default(false)
      }}
